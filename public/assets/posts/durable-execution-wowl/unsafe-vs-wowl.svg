<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Unsafe activity design versus WOWL design</title>
  <desc id="desc">A comparison showing an unsafe retryable activity with multiple side effects and a WOWL design split into several safe steps.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}.navy{fill:#071f4f}.muted{fill:#31466f}.blue{fill:#2468d8}.teal{fill:#0b8f87}.red{fill:#d43d2a}.softBlue{fill:#e8f1ff}.softTeal{fill:#e6f7f4}.card{fill:#fff;stroke:#d7deeb;stroke-width:2}.bad{fill:#fff;stroke:#ffb1a8;stroke-width:3}.good{fill:#fff;stroke:#89d6cf;stroke-width:3}.h1{font:800 72px Inter,Segoe UI,Arial,sans-serif}.h2{font:800 36px Inter,Segoe UI,Arial,sans-serif}.body{font:500 28px Inter,Segoe UI,Arial,sans-serif}.small{font:700 22px Inter,Segoe UI,Arial,sans-serif}.tiny{font:600 18px Inter,Segoe UI,Arial,sans-serif}.shadow{filter:drop-shadow(0 8px 18px rgba(7,31,79,.12))}.line{stroke:#0b8f87;stroke-width:4;fill:none;stroke-linecap:round}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12" fill="none" stroke="#0b8f87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <text x="80" y="105" class="h1 navy">Why WOWL matters</text>
  <text x="82" y="155" class="body muted">One retryable step should not spray side effects everywhere.</text>

  <g transform="translate(90 230)">
    <rect width="650" height="460" rx="32" class="bad shadow"/>
    <rect x="160" y="-25" width="330" height="58" rx="29" class="softBlue"/>
    <text x="225" y="13" class="h2 navy">Unsafe activity</text>
    <g transform="translate(90 80)">
      <circle cx="45" cy="45" r="38" fill="#fff" stroke="#89d6cf" stroke-width="3"/><text x="120" y="55" class="small navy">1  Charge payment</text>
      <path d="M45 88 V120" class="line" marker-end="url(#arrow)"/>
      <circle cx="45" cy="165" r="38" fill="#fff" stroke="#89d6cf" stroke-width="3"/><text x="120" y="175" class="small navy">2  Update CRM</text>
      <path d="M45 208 V240" class="line" marker-end="url(#arrow)"/>
      <circle cx="45" cy="285" r="38" fill="#fff" stroke="#89d6cf" stroke-width="3"/><text x="120" y="295" class="small navy">3  Send email</text>
    </g>
    <circle cx="465" cy="260" r="45" fill="#fff" stroke="#d43d2a" stroke-width="5"/>
    <text x="450" y="277" class="h2 red">!</text>
    <text x="390" y="330" class="small red">If this step retries,</text>
    <text x="390" y="360" class="small red">side effects may duplicate.</text>
    <text x="70" y="405" class="small navy">Problem: multiple writes in one retryable step</text>
  </g>

  <circle cx="800" cy="455" r="48" fill="#2468d8" class="shadow"/>
  <text x="771" y="467" class="h2" fill="#fff">VS.</text>

  <g transform="translate(860 230)">
    <rect width="650" height="460" rx="32" class="good shadow"/>
    <rect x="175" y="-25" width="300" height="58" rx="29" class="softTeal"/>
    <text x="235" y="13" class="h2 navy">WOWL design</text>
    <g transform="translate(70 60)">
      <rect width="510" height="78" rx="16" class="card shadow"/><circle cx="45" cy="39" r="26" fill="#e6f7f4" stroke="#0b8f87" stroke-width="2"/><text x="92" y="34" class="small navy">Activity 1: Charge payment</text><text x="92" y="61" class="tiny teal">idempotency key</text><circle cx="470" cy="39" r="20" class="teal"/><path d="M462 39 l6 7 l12 -16" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M255 86 V115" class="line" marker-end="url(#arrow)"/>
      <g transform="translate(0 122)"><rect width="510" height="78" rx="16" class="card shadow"/><circle cx="45" cy="39" r="26" fill="#e6f7f4" stroke="#0b8f87" stroke-width="2"/><text x="92" y="34" class="small navy">Activity 2: Update CRM</text><text x="92" y="61" class="tiny teal">upsert / dedupe</text><circle cx="470" cy="39" r="20" class="teal"/><path d="M462 39 l6 7 l12 -16" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <path d="M255 210 V238" class="line" marker-end="url(#arrow)"/>
      <g transform="translate(0 245)"><rect width="510" height="78" rx="16" class="card shadow"/><circle cx="45" cy="39" r="26" fill="#e6f7f4" stroke="#0b8f87" stroke-width="2"/><text x="92" y="34" class="small navy">Activity 3: Send email</text><text x="92" y="61" class="tiny teal">dedupe key</text><circle cx="470" cy="39" r="20" class="teal"/><path d="M462 39 l6 7 l12 -16" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
    </g>
    <text x="80" y="405" class="small navy">Benefit: clearer retries and recovery</text>
  </g>

  <rect x="190" y="740" width="1220" height="85" rx="18" class="card shadow"/>
  <text x="260" y="794" class="small red">messy</text>
  <text x="585" y="794" class="small navy">Retry scope</text>
  <text x="1110" y="794" class="small teal">clear</text>
  <text x="405" y="860" class="h2 navy">Make each retryable step end with one controlled side effect.</text>
</svg>
