<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">WOWL write once write last activity design</title>
  <desc id="desc">A retry-safe activity design showing repeatable reads and calculations before a side-effect boundary and one final idempotent write.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}.navy{fill:#071f4f}.muted{fill:#31466f}.blue{fill:#2468d8}.teal{fill:#0b8f87}.softBlue{fill:#e8f1ff}.softTeal{fill:#e6f7f4}.card{fill:#fff;stroke:#d7deeb;stroke-width:2}.outline{fill:#fff;stroke:#d7deeb;stroke-width:2}.h1{font:800 72px Inter,Segoe UI,Arial,sans-serif}.h2{font:800 36px Inter,Segoe UI,Arial,sans-serif}.body{font:500 28px Inter,Segoe UI,Arial,sans-serif}.small{font:700 22px Inter,Segoe UI,Arial,sans-serif}.tiny{font:600 18px Inter,Segoe UI,Arial,sans-serif}.shadow{filter:drop-shadow(0 8px 18px rgba(7,31,79,.12))}.dash{stroke:#2468d8;stroke-width:4;stroke-dasharray:12 14}.line{stroke:#0b8f87;stroke-width:5;fill:none;stroke-linecap:round}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12" fill="none" stroke="#0b8f87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <text x="80" y="105" class="h1 navy">WOWL: Write Once, Write Last</text>
  <text x="82" y="155" class="body muted">In a retryable step, do repeatable work first. Put the write at the end.</text>

  <rect x="95" y="230" width="1410" height="440" rx="32" class="card shadow"/>
  <text x="610" y="285" class="h2 navy">Retry-safe activity design</text>
  <rect x="150" y="320" width="870" height="290" rx="22" class="softBlue" opacity=".65"/>
  <rect x="1140" y="320" width="280" height="290" rx="22" class="softTeal" opacity=".85"/>
  <rect x="420" y="340" width="300" height="52" rx="26" fill="#d8e9ff"/>
  <text x="475" y="375" class="small navy">Retry-safe zone</text>

  <g transform="translate(205 430)">
    <g><circle cx="40" cy="40" r="38" fill="#fff" stroke="#c7d9f8" stroke-width="3"/><text x="30" y="51" class="h2 blue">1</text><text x="0" y="112" class="small navy">Read data</text></g>
    <path d="M92 40 H145" stroke="#2468d8" stroke-width="4" stroke-dasharray="10 12" fill="none"/>
    <g transform="translate(155 0)"><circle cx="40" cy="40" r="38" fill="#fff" stroke="#c7d9f8" stroke-width="3"/><text x="30" y="51" class="h2 blue">2</text><text x="-34" y="112" class="small navy">Read dependencies</text></g>
    <path d="M247 40 H300" stroke="#2468d8" stroke-width="4" stroke-dasharray="10 12" fill="none"/>
    <g transform="translate(310 0)"><circle cx="40" cy="40" r="38" fill="#fff" stroke="#c7d9f8" stroke-width="3"/><text x="30" y="51" class="h2 blue">3</text><text x="0" y="112" class="small navy">Validate</text></g>
    <path d="M402 40 H455" stroke="#2468d8" stroke-width="4" stroke-dasharray="10 12" fill="none"/>
    <g transform="translate(465 0)"><circle cx="40" cy="40" r="38" fill="#fff" stroke="#c7d9f8" stroke-width="3"/><text x="30" y="51" class="h2 blue">4</text><text x="-4" y="112" class="small navy">Calculate</text></g>
    <path d="M557 40 H610" stroke="#2468d8" stroke-width="4" stroke-dasharray="10 12" fill="none"/>
    <g transform="translate(620 0)"><circle cx="40" cy="40" r="38" fill="#fff" stroke="#c7d9f8" stroke-width="3"/><text x="30" y="51" class="h2 blue">5</text><text x="-10" y="112" class="small navy">Prepare request</text></g>
  </g>

  <line x1="1070" y1="330" x2="1070" y2="605" class="dash"/>
  <rect x="1002" y="440" width="138" height="66" rx="14" fill="#fff" stroke="#d7deeb" stroke-width="2" class="shadow"/>
  <text x="1022" y="466" class="tiny navy">Side-effect</text><text x="1030" y="490" class="tiny navy">boundary</text>

  <rect x="1205" y="340" width="150" height="52" rx="26" fill="#0b8f87"/>
  <text x="1234" y="375" class="small" fill="#fff">Final write</text>
  <path d="M1280 398 V438" class="line" marker-end="url(#arrow)"/>
  <rect x="1190" y="450" width="185" height="120" rx="18" fill="#fff" stroke="#0b8f87" stroke-width="3" class="shadow"/>
  <text x="1223" y="494" class="small navy">Write / external</text>
  <text x="1236" y="524" class="small navy">side effect</text>
  <text x="1214" y="555" class="tiny teal">idempotent if retried</text>

  <g transform="translate(250 720)">
    <circle cx="0" cy="0" r="16" class="teal"/><path d="M-7 0 l5 6 l10 -13" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="35" y="8" class="body navy">Reads and calculations can usually be repeated.</text>
  </g>
  <g transform="translate(250 770)">
    <circle cx="0" cy="0" r="16" class="teal"/><path d="M-7 0 l5 6 l10 -13" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="35" y="8" class="body navy">The final write changes the outside world.</text>
  </g>
  <g transform="translate(250 820)">
    <circle cx="0" cy="0" r="16" class="teal"/><path d="M-7 0 l5 6 l10 -13" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="35" y="8" class="body navy">Read many. Decide once. Write last.</text>
  </g>
</svg>
